<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多模态知识图谱</title>
    <link rel="stylesheet" href="../../css/cyber.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background: #0a0a0f; }

        .demo-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(0,245,255,0.12);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .demo-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00f5ff;
            text-shadow: 0 0 12px rgba(0,245,255,0.6), 0 0 30px rgba(0,245,255,0.25);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .demo-title i { color: #00f5ff; }

        .demo-subtitle {
            font-size: 0.82rem;
            color: #7a7a8c;
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
        }

        .demo-badge {
            font-size: 0.6rem;
            padding: 3px 10px;
            border: 1px solid #ff2d78;
            color: #ff2d78;
            border-radius: 2px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(255,45,120,0.08);
            margin-top: 8px;
            display: inline-block;
        }

        /* ── 主布局 ── */
        .mm-grid {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 20px;
            align-items: start;
        }

        /* ── 图谱区域 ── */
        .graph-area {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0,245,255,0.12);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            min-height: 540px;
        }

        .graph-area::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #bf5af2, transparent);
            opacity: 0.4;
            z-index: 1;
        }

        #mm-graph { width: 100%; height: 540px; display: block; }

        /* ── 类型标签栏 ── */
        .type-tabs {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(0,245,255,0.08);
            flex-wrap: wrap;
            align-items: center;
        }

        .type-tab {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 2px;
            font-size: 0.65rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .type-tab:hover { opacity: 0.8; }
        .type-tab.active { border-color: currentColor; }
        .type-tab.all { color: #7a7a8c; }
        .type-tab.img { color: #ff2d78; }
        .type-tab.txt { color: #bf5af2; }
        .type-tab.entity { color: #00f5ff; }

        .tab-hint {
            margin-left: auto;
            font-size: 0.65rem;
            color: #3a3a4a;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── 图例 ── */
        .graph-legend {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(0,245,255,0.12);
            border-radius: 3px;
            padding: 8px 12px;
        }

        .legend-item {
            font-size: 0.68rem;
            color: #7a7a8c;
            margin-bottom: 4px;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-item:last-child { margin-bottom: 0; }

        .legend-dot {
            width: 8px; height: 8px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* ── 详情面板 ── */
        .detail-panel {
            position: absolute;
            top: 56px;
            right: 12px;
            width: 320px;
            background: rgba(13,17,23,0.96);
            border: 1px solid rgba(191,90,242,0.25);
            border-radius: 4px;
            z-index: 10;
            backdrop-filter: blur(12px);
            animation: slideIn 0.2s ease;
            overflow: hidden;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .detail-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
            filter: brightness(0.8) saturate(0.9);
        }

        .detail-img-placeholder {
            width: 100%;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: rgba(255,255,255,0.1);
        }

        .detail-body { padding: 14px; }

        .detail-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e0e0e0;
            margin: 0 0 8px 0;
            font-family: 'JetBrains Mono', monospace;
        }

        .detail-type-tag {
            display: inline-block;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 2px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-family: 'JetBrains Mono', monospace;
        }

        .detail-desc {
            font-size: 0.78rem;
            color: #7a7a8c;
            line-height: 1.6;
            margin-bottom: 12px;
            font-family: 'JetBrains Mono', monospace;
        }

        .detail-attrs { display: flex; flex-direction: column; gap: 5px; }

        .detail-attr {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.72rem;
            padding: 5px 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
        }

        .detail-attr i { color: #00f5ff; width: 14px; text-align: center; flex-shrink: 0; }

        .detail-attr span { color: #7a7a8c; }

        .detail-close {
            position: absolute;
            top: 8px;
            right: 10px;
            width: 26px; height: 26px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(0,245,255,0.2);
            color: #7a7a8c;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .detail-close:hover {
            background: rgba(0,245,255,0.1);
            border-color: rgba(0,245,255,0.4);
            color: #00f5ff;
        }

        /* ── 右侧面板 ── */
        .right-col { display: flex; flex-direction: column; gap: 16px; }

        .section-title {
            font-size: 0.72rem;
            color: #bf5af2;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.9;
        }

        /* ── 统计卡片 ── */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,245,255,0.1);
            border-radius: 4px;
            padding: 14px;
            text-align: center;
        }

        .stat-num {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00f5ff;
            text-shadow: 0 0 10px rgba(0,245,255,0.5);
            line-height: 1;
            display: block;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-num.pink { color: #ff2d78; text-shadow: 0 0 10px rgba(255,45,120,0.5); }
        .stat-num.purple { color: #bf5af2; text-shadow: 0 0 10px rgba(191,90,242,0.5); }
        .stat-num.green { color: #30d158; text-shadow: 0 0 10px rgba(48,209,88,0.5); }

        .stat-label {
            font-size: 0.62rem;
            color: #3a3a4a;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── 搜索 ── */
        .search-row {
            display: flex;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            padding: 8px 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0,245,255,0.12);
            border-radius: 3px;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            outline: none;
            caret-color: #00f5ff;
            transition: border-color 0.3s;
        }

        .search-input:focus { border-color: rgba(0,245,255,0.4); }
        .search-input::placeholder { color: #3a3a4a; }

        .search-btn {
            padding: 8px 14px;
            background: rgba(0,245,255,0.1);
            border: 1px solid rgba(0,245,255,0.3);
            border-radius: 3px;
            color: #00f5ff;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }

        .search-btn:hover { background: rgba(0,245,255,0.2); }

        /* ── 邻居列表 ── */
        .neighbor-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }

        .neighbor-list::-webkit-scrollbar { width: 3px; }
        .neighbor-list::-webkit-scrollbar-thumb { background: rgba(191,90,242,0.3); border-radius: 2px; }

        .neighbor-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }

        .neighbor-item:hover { background: rgba(191,90,242,0.1); }

        .neighbor-dot {
            width: 10px; height: 10px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .neighbor-name { color: #e0e0e0; font-weight: 500; }

        .neighbor-rel { color: #3a3a4a; font-size: 0.7rem; }

        /* ── 响应式 ── */
        @media (max-width: 900px) {
            .mm-grid { grid-template-columns: 1fr; }
            #mm-graph { height: 380px; }
            .graph-area { min-height: 380px; }
            .detail-panel { width: calc(100% - 24px); }
        }
    </style>
</head>
<body class="cyber-body">
<div class="cyber-grid-bg"></div>

<div class="cyber-container cyber-main" style="padding-top:20px;">

    <div class="demo-header">
        <div>
            <h1 class="demo-title">
                <i class="fas fa-layer-group"></i>Multi-Modal KG
            </h1>
            <p class="demo-subtitle">// 文本 · 图像 · 知识 多模态融合图谱 · 奶业/医疗/旅游</p>
            <span class="demo-badge">多模态融合</span>
        </div>
    </div>

    <div class="mm-grid">
        <!-- 左：图谱 -->
        <div class="graph-area">
            <div class="type-tabs">
                <span class="type-tab all active" onclick="filterNodes('all',this)">
                    <i class="fas fa-border-all"></i> 全部
                </span>
                <span class="type-tab img" onclick="filterNodes('image',this)">
                    <i class="fas fa-image"></i> 图文节点
                </span>
                <span class="type-tab txt" onclick="filterNodes('text',this)">
                    <i class="fas fa-file-alt"></i> 文本节点
                </span>
                <span class="type-tab entity" onclick="filterNodes('entity',this)">
                    <i class="fas fa-circle"></i> 实体节点
                </span>
                <span class="tab-hint"><i class="fas fa-info-circle" style="margin-right:4px;"></i>点击节点查看详情</span>
            </div>
            <div id="mm-graph"></div>
            <div class="graph-legend">
                <div class="legend-item"><span class="legend-dot" style="background:#ff2d78"></span> 图文节点（奶业/医疗/旅游）</div>
                <div class="legend-item"><span class="legend-dot" style="background:#bf5af2"></span> 文本节点（政策/指南）</div>
                <div class="legend-item"><span class="legend-dot" style="background:#00f5ff"></span> 实体节点（机构/概念）</div>
            </div>
        </div>

        <!-- 右：面板 -->
        <div class="right-col">
            <div class="cyber-card">
                <div class="section-title"><i class="fas fa-chart-pie"></i> 图谱统计</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-num" id="statNodes">12</span>
                        <span class="stat-label">实体总数</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-num purple" id="statRels">16</span>
                        <span class="stat-label">关系总数</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-num pink" id="statImg">5</span>
                        <span class="stat-label">图文节点</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-num purple" id="statTxt">4</span>
                        <span class="stat-label">文本节点</span>
                    </div>
                </div>
            </div>

            <div class="cyber-card">
                <div class="section-title"><i class="fas fa-search"></i> 节点搜索</div>
                <div class="search-row">
                    <input class="search-input" id="mmSearch" placeholder="输入节点名称..." oninput="searchNode()">
                    <button class="search-btn" onclick="searchNode()"><i class="fas fa-search"></i></button>
                </div>
            </div>

            <div class="cyber-card">
                <div class="section-title"><i class="fas fa-arrows-alt"></i> 邻居节点</div>
                <div class="neighbor-list" id="mmNeighborList">
                    <div style="text-align:center;padding:40px 0;color:#3a3a4a;font-size:0.78rem;font-family:'JetBrains Mono',monospace;">
                        <i class="fas fa-hand-pointer" style="font-size:1.2rem;margin-bottom:8px;display:block;opacity:0.3;"></i>
                        点击图谱中的节点查看邻居
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
const MM_NODES = [
    { id:'n1', name:'伊利实业集团', type:'entity', desc:'中国乳制品行业龙头企业，业务涵盖原奶收购、乳制品加工及销售全产业链。', attrs:{'类型':'企业','总部':'呼和浩特','成立':'1993年','员工':'6万+'}, img:null },

    { id:'n5', name:'内蒙古博物院', type:'image', desc:'内蒙古自治区最大的博物馆，收藏文物近7万件，是了解草原文化的重要窗口。', attrs:{'类型':'博物馆','级别':'国家一级','门票':'免费','游览':'2-3小时'}, img:'https://picsum.photos/seed/museum/600/300' },
    { id:'n6', name:'二甲双胍用药指南', type:'text', desc:'二甲双胍是2型糖尿病一线用药，主要作用机制为抑制肝糖输出、改善胰岛素敏感性。', attrs:{'剂型':'片剂','规格':'0.5g','用法':'每日2-3次'}, img:null },
    { id:'n7', name:'呼和浩特旅游攻略', type:'text', desc:'呼和浩特是内蒙古首府，推荐游览：内蒙古博物院、昭君墓、敕勒川草原。', attrs:{'建议天数':'2-3天','最佳季节':'夏秋季','交通':'飞机/高铁'}, img:null },
    { id:'n8', name:'供应链金融贷款', type:'entity', desc:'基于核心企业信用，为上下游中小企业提供的融资服务，可缓解牧场的资金压力。', attrs:{'类型':'供应链金融','期限':'3-12个月','利率':'4.35%起'}, img:'https://picsum.photos/seed/finance/600/300' },
    { id:'n9', name:'烤全羊', type:'image', desc:'内蒙古传统名菜，选用草原放养的优质绵羊，古法炭火慢烤数小时，外酥里嫩。', attrs:{'类型':'传统美食','人均':'150-200元','推荐':'额吉炭火烤全羊'}, img:'https://picsum.photos/seed/lamb/600/300' },
    { id:'n10', name:'生鲜牛乳检测报告', type:'text', desc:'生鲜牛乳质量检测报告，包含蛋白质含量、脂肪含量、菌落总数等关键指标。', attrs:{'蛋白质':'≥3.0%','脂肪':'≥3.5%','微生物':'合格'}, img:null },
    { id:'n11', name:'电商平台', type:'entity', desc:'线上B2C销售平台，如天猫、京东等，为乳制品企业提供直达消费者的销售渠道。', attrs:{'类型':'电商','覆盖':'全国','优势':'物流快捷'}, img:'https://picsum.photos/seed/ecommerce/600/300' },
    { id:'n12', name:'冠脉CT检查报告', type:'text', desc:'冠状动脉CT血管成像是无创检查冠心病的首选方法，可清晰显示冠状动脉狭窄程度。', attrs:{'类型':'影像检查','用时':'10-15分钟','准备':'空腹'}, img:null },
];

const MM_LINKS = [
    { source:'n1', target:'n2', type:'生产' },
    { source:'n1', target:'n3', type:'采购' },
    { source:'n1', target:'n8', type:'提供' },
    { source:'n1', target:'n11', type:'合作' },
    { source:'n2', target:'n11', type:'销售' },
    { source:'n3', target:'n10', type:'出具' },
    { source:'n4', target:'n6', type:'用药' },
    { source:'n5', target:'n7', type:'收录于' },
    { source:'n1', target:'n5', type:'赞助' },
    { source:'n8', target:'n3', type:'支持' },
    { source:'n9', target:'n5', type:'邻近' },
    { source:'n11', target:'n9', type:'推荐' },
    { source:'n4', target:'n12', type:'检查' },
    { source:'n5', target:'n9', type:'美食推荐' },
    { source:'n7', target:'n9', type:'包含' },
    { source:'n2', target:'n10', type:'原料' },
];

const MM_TYPE_COLORS = {
    image:  { fill:'#ff2d78', stroke:'rgba(255,45,120,0.4)', glow:'#ff2d78' },
    text:   { fill:'#bf5af2', stroke:'rgba(191,90,242,0.4)', glow:'#bf5af2' },
    entity: { fill:'#00f5ff', stroke:'rgba(0,245,255,0.4)', glow:'#00f5ff' },
};

let mmSim, mmSvg, mmG;

function initMMGraph(filter) {
    const container = document.getElementById('mm-graph');
    const W = container.clientWidth;
    const H = container.clientHeight;

    d3.select('#mm-graph').selectAll('*').remove();

    mmSvg = d3.select('#mm-graph').append('svg').attr('width', W).attr('height', H).attr('viewBox', [0,0,W,H]);

    mmSvg.append('defs').append('marker')
        .attr('id', 'mm-arrow')
        .attr('viewBox','0 -5 10 10')
        .attr('refX', 28).attr('refY', 0)
        .attr('markerWidth', 5).attr('markerHeight', 5)
        .attr('orient', 'auto')
        .append('path').attr('d','M0,-5L10,0L0,5').attr('fill','rgba(0,245,255,0.5)');

    mmSvg.append('defs').append('filter').attr('id','glow-mm')
        .append('feGaussianBlur').attr('stdDeviation', 3).attr('result','coloredBlur');
    const feMerge = mmSvg.select('defs').select('filter').append('feMerge');
    feMerge.append('feMergeNode').attr('in','coloredBlur');
    feMerge.append('feMergeNode').attr('in','SourceGraphic');

    mmG = mmSvg.append('g');

    const visibleNodes = filter==='all' ? MM_NODES : MM_NODES.filter(n=>n.type===filter);
    const visibleIds = new Set(visibleNodes.map(n=>n.id));
    const visibleLinks = MM_LINKS.filter(l=>visibleIds.has(l.source)&&visibleIds.has(l.target));

    renderMMGraph(visibleNodes, visibleLinks, W, H);
}

function renderMMGraph(nodes, links, W, H) {
    mmG.selectAll('*').remove();

    const link = mmG.append('g').selectAll('line')
        .data(links).enter().append('line')
        .attr('stroke','rgba(0,245,255,0.3)')
        .attr('stroke-width', 1.5)
        .attr('marker-end','url(#mm-arrow)');

    const linkLabel = mmG.append('g').selectAll('text')
        .data(links).enter().append('text')
        .text(d=>d.type)
        .attr('font-size', 9)
        .attr('fill','rgba(0,245,255,0.5)')
        .attr('text-anchor','middle')
        .attr('font-family','JetBrains Mono, monospace');

    const node = mmG.append('g').selectAll('g')
        .data(nodes).enter().append('g')
        .attr('cursor','pointer')
        .call(d3.drag()
            .on('start',(e,d)=>{ if(!e.active) mmSim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
            .on('drag',(e,d)=>{ d.fx=e.x; d.fy=e.y; })
            .on('end',(e,d)=>{ if(!e.active) mmSim.alphaTarget(0); d.fx=null; d.fy=null; }))
        .on('click',(e,d)=>{ e.stopPropagation(); showDetail(d); highlightNeighbors(d); });

    // 外发光
    node.append('circle')
        .attr('r', 22)
        .attr('fill','none')
        .attr('stroke', d=>MM_TYPE_COLORS[d.type].glow)
        .attr('stroke-width', 1)
        .attr('opacity', 0)
        .transition().delay((d,i)=>i*80).duration(600)
        .attr('opacity', 0.2);

    // 节点主体
    node.append('rect')
        .attr('width', d=>Math.max(d.name.length*13+28,80))
        .attr('height', d=>d.type==='image'?32:30)
        .attr('x', d=>-(Math.max(d.name.length*13+28,80))/2)
        .attr('y', d=>d.type==='image'?-16:-15)
        .attr('rx', d=>d.type==='image'?6:4)
        .attr('fill', d=>MM_TYPE_COLORS[d.type].fill)
        .attr('stroke', d=>MM_TYPE_COLORS[d.type].stroke)
        .attr('stroke-width', 1.5)
        .attr('filter','url(#glow-mm)')
        .attr('opacity', 0)
        .transition().delay((d,i)=>i*80).duration(500)
        .attr('opacity', 1);

    // 类型图标
    const typeIcons = { image:'🖼', text:'📄', entity:'🔗' };
    node.append('text')
        .text(d=>typeIcons[d.type])
        .attr('font-size', 10)
        .attr('x', d=>-(Math.max(d.name.length*13+28,80))/2+8)
        .attr('y', d=>d.type==='image'?4:3)
        .attr('opacity', 0)
        .transition().delay((d,i)=>i*80).duration(400)
        .attr('opacity', 1);

    // 节点文字
    node.append('text')
        .text(d=>d.name)
        .attr('text-anchor','start')
        .attr('dominant-baseline','central')
        .attr('font-size', 11)
        .attr('fill','#0a0a0f')
        .attr('font-weight','600')
        .attr('x', d=>-(Math.max(d.name.length*13+28,80))/2+22)
        .attr('opacity', 0)
        .transition().delay((d,i)=>i*80+200).duration(400)
        .attr('opacity', 1);

    mmSim = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d=>d.id).distance(110))
        .force('charge', d3.forceManyBody().strength(-320))
        .force('center', d3.forceCenter(W/2, H/2))
        .force('collision', d3.forceCollide(35))
        .on('tick',()=>{
            link
                .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
                .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
            linkLabel
                .attr('x',d=>(d.source.x+d.target.x)/2)
                .attr('y',d=>(d.source.y+d.target.y)/2-8);
            node.attr('transform',d=>`translate(${d.x},${d.y})`);
        });

    // 更新统计
    const imgCnt = MM_NODES.filter(n=>n.type==='image').length;
    const txtCnt = MM_NODES.filter(n=>n.type==='text').length;
    document.getElementById('statImg').textContent = imgCnt;
    document.getElementById('statTxt').textContent = txtCnt;
    document.getElementById('statNodes').textContent = MM_NODES.length;
    document.getElementById('statRels').textContent = MM_LINKS.length;
}

function showDetail(d) {
    const existing = document.getElementById('mmDetailPanel');
    if (existing) existing.remove();

    const col = MM_TYPE_COLORS[d.type];
    const typeLabel = { image:'图文节点', text:'文本节点', entity:'实体节点' };

    const panel = document.createElement('div');
    panel.id = 'mmDetailPanel';
    panel.className = 'detail-panel';

    let imgHTML;
    if (d.img) {
        imgHTML = `<img src="${d.img}" alt="${d.name}" class="detail-img" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`;
        const icons = { image:'🖼', text:'📄', entity:'🔗' };
        imgHTML += `<div class="detail-img-placeholder" style="background:${col.fill}18;display:none;"><span style="font-size:2rem;">${icons[d.type]}</span></div>`;
    } else {
        const icons = { image:'🖼', text:'📄', entity:'🔗' };
        imgHTML = `<div class="detail-img-placeholder" style="background:${col.fill}18;"><span style="font-size:2rem;">${icons[d.type]}</span></div>`;
    }

    let attrsHTML = Object.entries(d.attrs||{}).map(([k,v])=>
        `<div class="detail-attr"><i class="fas fa-tag"></i><span>${k}：${v}</span></div>`
    ).join('');

    panel.innerHTML = `
        <button class="detail-close" onclick="this.closest('#mmDetailPanel').remove()"><i class="fas fa-times"></i></button>
        ${imgHTML}
        <div class="detail-body">
            <div class="detail-title">${d.name}</div>
            <span class="detail-type-tag" style="background:${col.fill}18;color:${col.fill};border:1px solid ${col.fill}33">
                ${typeLabel[d.type]}
            </span>
            <div class="detail-desc">${d.desc}</div>
            <div class="detail-attrs">${attrsHTML}</div>
        </div>
    `;
    document.querySelector('.graph-area').appendChild(panel);
}

function highlightNeighbors(d) {
    const neighborLinks = [];
    MM_LINKS.forEach(l=>{
        if (l.source===d.id||l.target===d.id) {
            const otherId = l.source===d.id?l.target:l.source;
            const other = MM_NODES.find(n=>n.id===otherId);
            if (other) neighborLinks.push({ link:l, other });
        }
    });

    const list = document.getElementById('mmNeighborList');
    list.innerHTML = '';

    if (neighborLinks.length===0) {
        list.innerHTML = '<div style="text-align:center;padding:20px;color:#3a3a4a;font-size:0.78rem;font-family:\'JetBrains Mono\',monospace;">该节点暂无邻居</div>';
        return;
    }

    neighborLinks.forEach(({link, other})=>{
        const col = MM_TYPE_COLORS[other.type];
        const item = document.createElement('div');
        item.className = 'neighbor-item';
        item.onclick = ()=>{ showDetail(other); highlightNeighbors(other); };
        item.innerHTML = `
            <div class="neighbor-dot" style="background:${col.fill};"></div>
            <div style="flex:1;">
                <div class="neighbor-name">${other.name}</div>
                <div class="neighbor-rel">← ${link.type} →</div>
            </div>
        `;
        list.appendChild(item);
    });
}

function filterNodes(type, el) {
    document.querySelectorAll('.type-tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    initMMGraph(type);
    const panel = document.getElementById('mmDetailPanel');
    if (panel) panel.remove();
    document.getElementById('mmNeighborList').innerHTML = `
        <div style="text-align:center;padding:40px 0;color:#3a3a4a;font-size:0.78rem;font-family:'JetBrains Mono',monospace;">
            <i class="fas fa-hand-pointer" style="font-size:1.2rem;margin-bottom:8px;display:block;opacity:0.3;"></i>
            点击图谱中的节点查看邻居
        </div>`;
}

function searchNode() {
    const query = document.getElementById('mmSearch').value.trim().toLowerCase();
    if (!query) return;
    const found = MM_NODES.find(n=>n.name.toLowerCase().includes(query));
    if (found) {
        showDetail(found);
        highlightNeighbors(found);
    }
}

document.addEventListener('click', (e)=>{
    if (!e.target.closest('.detail-panel') && !e.target.closest('.neighbor-item')) {
        const panel = document.getElementById('mmDetailPanel');
        if (panel) panel.remove();
    }
});

window.addEventListener('load', ()=>initMMGraph('all'));
window.addEventListener('resize', ()=>initMMGraph('all'));
</script>
</body>
</html>
