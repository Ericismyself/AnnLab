<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识融合与推理 · 旅游文化</title>
    <link rel="stylesheet" href="../../css/cyber.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background: #0a0a0f; }

        .demo-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(0,245,255,0.12);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .demo-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00f5ff;
            text-shadow: 0 0 12px rgba(0,245,255,0.6), 0 0 30px rgba(0,245,255,0.25);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .demo-title i { color: #00f5ff; }

        .demo-subtitle {
            font-size: 0.82rem;
            color: #7a7a8c;
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
        }

        .demo-badge {
            font-size: 0.6rem;
            padding: 3px 10px;
            border: 1px solid #ff2d78;
            color: #ff2d78;
            border-radius: 2px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(255,45,120,0.08);
            margin-top: 8px;
            display: inline-block;
        }

        /* ── 三列布局 ── */
        .fusion-grid {
            display: grid;
            grid-template-columns: 1fr 300px 1fr;
            gap: 16px;
            align-items: start;
        }

        /* ── 图谱面板 ── */
        .fusion-panel {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,245,255,0.12);
            border-radius: 4px;
            overflow: hidden;
        }

        .fusion-panel-hdr {
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .fusion-panel-hdr.left {
            background: rgba(0,245,255,0.05);
            border-bottom: 1px solid rgba(0,245,255,0.15);
        }

        .fusion-panel-hdr.right {
            background: rgba(191,90,242,0.05);
            border-bottom: 1px solid rgba(191,90,242,0.15);
        }

        .fusion-panel-hdr.merged {
            background: rgba(48,209,88,0.05);
            border-bottom: 1px solid rgba(48,209,88,0.15);
        }

        .panel-title {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'JetBrains Mono', monospace;
        }

        .panel-title.left { color: #00f5ff; }
        .panel-title.right { color: #bf5af2; }
        .panel-title.merged { color: #30d158; }

        .panel-src {
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 2px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
        }

        .panel-src.left { color: #00f5ff; border: 1px solid rgba(0,245,255,0.3); }
        .panel-src.right { color: #bf5af2; border: 1px solid rgba(191,90,242,0.3); }

        .fusion-graph {
            height: 300px;
            position: relative;
        }

        .fusion-graph svg { width: 100%; height: 300px; display: block; }

        .fusion-stats {
            padding: 8px 14px;
            border-top: 1px solid rgba(0,245,255,0.08);
            display: flex;
            gap: 16px;
            font-size: 0.72rem;
            color: #3a3a4a;
            font-family: 'JetBrains Mono', monospace;
        }

        .fusion-stats strong { color: #e0e0e0; }

        /* ── 中央控制区 ── */
        .ctrl-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ctrl-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,245,255,0.1);
            border-radius: 3px;
            font-size: 0.75rem;
            color: #3a3a4a;
            font-family: 'JetBrains Mono', monospace;
        }

        .ctrl-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── 候选区 ── */
        .candidate-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,245,255,0.12);
            border-radius: 4px;
            padding: 12px 14px;
        }

        .candidate-title {
            font-size: 0.68rem;
            color: #7a7a8c;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cand-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 0;
            font-size: 0.75rem;
            border-bottom: 1px solid rgba(0,245,255,0.05);
            font-family: 'JetBrains Mono', monospace;
        }

        .cand-item:last-child { border-bottom: none; }

        .cand-left { color: #00f5ff; }
        .cand-eq { color: #3a3a4a; }
        .cand-right { color: #bf5af2; }

        .cand-score {
            margin-left: auto;
            font-size: 0.65rem;
            padding: 1px 6px;
            border-radius: 2px;
            font-weight: 700;
        }

        .cand-score.high { background: rgba(48,209,88,0.15); color: #30d158; }
        .cand-score.mid { background: rgba(255,214,10,0.15); color: #ffd60a; }

        /* ── 融合日志 ── */
        .fusion-log {
            max-height: 180px;
            overflow-y: auto;
        }

        .fusion-log::-webkit-scrollbar { width: 3px; }
        .fusion-log::-webkit-scrollbar-thumb { background: rgba(48,209,88,0.3); border-radius: 2px; }

        .fusion-log-item {
            display: flex;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(48,209,88,0.06);
            font-size: 0.78rem;
            animation: fadeIn 0.3s ease;
        }

        .fusion-log-item:last-child { border-bottom: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fusion-log-icon {
            width: 20px; height: 20px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .fusion-log-text { flex: 1; color: #7a7a8c; line-height: 1.5; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; }

        /* ── 底部融合结果 ── */
        .fused-section {
            grid-column: 1 / -1;
            margin-top: 8px;
        }

        .fused-inner {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 16px;
        }

        .fused-graph {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(48,209,88,0.15);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            min-height: 300px;
        }

        .fused-graph svg { width: 100%; height: 300px; display: block; }

        /* ── 响应式 ── */
        @media (max-width: 900px) {
            .fusion-grid { grid-template-columns: 1fr; }
            .ctrl-col { order: -1; }
            .fused-inner { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="cyber-body">
<div class="cyber-grid-bg"></div>

<div class="cyber-container cyber-main" style="padding-top:20px;">

    <div class="demo-header">
        <div>
            <h1 class="demo-title">
                <i class="fas fa-sitemap"></i>KG Fusion
            </h1>
            <p class="demo-subtitle">// 跨源知识融合 · 内蒙古旅游数据对齐与推理</p>
            <span class="demo-badge">旅游文化</span>
        </div>
    </div>

    <div class="fusion-grid">
        <!-- 左侧：SOURCE A -->
        <div>
            <div class="fusion-panel">
                <div class="fusion-panel-hdr left">
                    <span class="panel-title left"><i class="fas fa-database"></i> SOURCE_A</span>
                    <span class="panel-src left">马蜂窝</span>
                </div>
                <div class="fusion-graph"><div id="fusion-left"></div></div>
                <div class="fusion-stats">
                    <span><i class="fas fa-circle" style="font-size:0.4rem;color:#00f5ff;margin-right:4px;"></i> 实体 <strong id="leftNodes">5</strong></span>
                    <span><i class="fas fa-link" style="font-size:0.5rem;color:#00f5ff;margin-right:4px;"></i> 关系 <strong id="leftRels">4</strong></span>
                </div>
            </div>
        </div>

        <!-- 中央控制 -->
        <div class="ctrl-col">
            <div class="ctrl-status" id="fusionStatus">
                <div class="ctrl-dot" id="fusionDot" style="background:#3a3a4a;"></div>
                <span id="fusionStatusText">等待开始</span>
            </div>

            <button class="cyber-btn" id="step1Btn" onclick="runStep1()" style="width:100%;justify-content:center;">
                <i class="fas fa-search"></i> STEP 1 · 实体对齐
            </button>
            <button class="cyber-btn" id="step2Btn" onclick="runStep2()" disabled style="width:100%;justify-content:center;opacity:0.4;">
                <i class="fas fa-compress-arrows-alt"></i> STEP 2 · 执行融合
            </button>
            <button class="cyber-btn" id="step3Btn" onclick="runStep3()" disabled style="width:100%;justify-content:center;opacity:0.4;">
                <i class="fas fa-check-circle"></i> STEP 3 · 完成推理
            </button>

            <div class="cyber-divider"></div>

            <div class="candidate-box">
                <div class="candidate-title">
                    <i class="fas fa-exchange-alt" style="color:#7a7a8c;"></i> 对齐候选
                </div>
                <div class="cand-item">
                    <span class="cand-left">呼和浩特</span>
                    <span class="cand-eq">≈</span>
                    <span class="cand-right">呼市</span>
                    <span class="cand-score high">95%</span>
                </div>
                <div class="cand-item">
                    <span class="cand-left">内蒙古博物院</span>
                    <span class="cand-eq">≈</span>
                    <span class="cand-right">内蒙古博物馆</span>
                    <span class="cand-score high">92%</span>
                </div>
                <div class="cand-item">
                    <span class="cand-left">烤全羊</span>
                    <span class="cand-eq">≈</span>
                    <span class="cand-right">额吉炭火烤全羊</span>
                    <span class="cand-score mid">78%</span>
                </div>
            </div>

            <button class="cyber-btn" onclick="resetFusion()" style="width:100%;justify-content:center;">
                <i class="fas fa-redo"></i> 重置
            </button>
        </div>

        <!-- 右侧：SOURCE B -->
        <div>
            <div class="fusion-panel">
                <div class="fusion-panel-hdr right">
                    <span class="panel-title right"><i class="fas fa-database"></i> SOURCE_B</span>
                    <span class="panel-src right">大众点评</span>
                </div>
                <div class="fusion-graph"><div id="fusion-right"></div></div>
                <div class="fusion-stats">
                    <span><i class="fas fa-circle" style="font-size:0.4rem;color:#bf5af2;margin-right:4px;"></i> 实体 <strong id="rightNodes">5</strong></span>
                    <span><i class="fas fa-link" style="font-size:0.5rem;color:#bf5af2;margin-right:4px;"></i> 关系 <strong id="rightRels">4</strong></span>
                </div>
            </div>
        </div>

        <!-- 底部：融合结果 -->
        <div class="fused-section">
            <div class="fusion-panel">
                <div class="fusion-panel-hdr merged">
                    <span class="panel-title merged"><i class="fas fa-project-diagram"></i> FUSED GRAPH</span>
                    <span class="panel-src left" style="color:#30d158;border-color:rgba(48,209,88,0.3);">统一知识图谱</span>
                </div>
                <div class="fused-inner">
                    <div class="fused-graph"><div id="fusion-merged"></div></div>
                    <div class="fusion-log" id="fusionLog">
                        <div style="text-align:center;padding:60px 0;color:#3a3a4a;font-size:0.78rem;font-family:'JetBrains Mono',monospace;">
                            <i class="fas fa-sitemap" style="font-size:1.2rem;margin-bottom:8px;display:block;opacity:0.3;"></i>
                            融合日志将显示于此
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
const LEFT_NODES = [
    { id:'a1', name:'呼和浩特', type:'location' },
    { id:'a2', name:'内蒙古博物院', type:'attraction' },
    { id:'a3', name:'烤全羊', type:'food' },
    { id:'a4', name:'2小时', type:'meta' },
    { id:'a5', name:'150元', type:'meta' },
];
const LEFT_LINKS = [
    { source:'a1', target:'a2', type:'景点' },
    { source:'a1', target:'a3', type:'美食' },
    { source:'a2', target:'a4', type:'游览' },
    { source:'a3', target:'a5', type:'消费' },
];

const RIGHT_NODES = [
    { id:'b1', name:'呼市', type:'location' },
    { id:'b2', name:'内蒙古博物馆', type:'attraction' },
    { id:'b3', name:'额吉炭火烤全羊', type:'food' },
    { id:'b4', name:'4.8分', type:'meta' },
    { id:'b5', name:'传统蒙餐', type:'meta' },
];
const RIGHT_LINKS = [
    { source:'b1', target:'b2', type:'景点' },
    { source:'b1', target:'b3', type:'餐厅' },
    { source:'b2', target:'b4', type:'评分' },
    { source:'b3', target:'b5', type:'特色' },
];

const LEFT_COLOR = '#00f5ff';
const RIGHT_COLOR = '#bf5af2';
const MERGE_COLOR = '#30d158';

const TYPE_COLORS_L = { location:'#00f5ff', attraction:'#30d158', food:'#ffd60a', meta:'#3a3a4a' };
const TYPE_COLORS_R = { location:'#bf5af2', attraction:'#30d158', food:'#ffd60a', meta:'#3a3a4a' };
const TYPE_COLORS_M = { location:'#00f5ff', attraction:'#30d158', food:'#ffd60a', meta:'#3a3a4a' };

function makeGraph(containerId, nodes, links, color, typeColors) {
    const el = document.getElementById(containerId);
    const W = el ? (el.clientWidth || 300) : 300;
    const H = 300;

    if (!el) return;
    d3.select('#'+containerId).selectAll('*').remove();

    const svg = d3.select('#'+containerId).append('svg').attr('width', W).attr('height', H);

    svg.append('defs').append('marker')
        .attr('id','arr-'+containerId)
        .attr('viewBox','0 -5 10 10')
        .attr('refX', 24).attr('refY', 0)
        .attr('markerWidth', 5).attr('markerHeight', 5)
        .attr('orient', 'auto')
        .append('path').attr('d','M0,-5L10,0L0,5').attr('fill', color+'66');

    const g = svg.append('g');

    const link = g.append('g').selectAll('line')
        .data(links).enter().append('line')
        .attr('stroke', color+'44')
        .attr('stroke-width', 1.5)
        .attr('marker-end',`url(#arr-${containerId})`);

    const linkLabel = g.append('g').selectAll('text')
        .data(links).enter().append('text')
        .text(d=>d.type)
        .attr('font-size', 9)
        .attr('fill', color+'88')
        .attr('text-anchor','middle')
        .attr('font-family','JetBrains Mono, monospace');

    const node = g.append('g').selectAll('g')
        .data(nodes).enter().append('g');

    node.append('rect')
        .attr('width', d=>Math.max(d.name.length*12+24,70))
        .attr('height', 28)
        .attr('x', d=>-(Math.max(d.name.length*12+24,70))/2)
        .attr('y', -14)
        .attr('rx', 3)
        .attr('fill', d=>typeColors[d.type]||'#5b9cf6')
        .attr('stroke', color+'44')
        .attr('stroke-width', 1)
        .attr('opacity', 0)
        .transition().delay((d,i)=>i*120).duration(500).attr('opacity', 1);

    node.append('text')
        .text(d=>d.name)
        .attr('text-anchor','middle')
        .attr('dominant-baseline','central')
        .attr('font-size', 10)
        .attr('fill','#0a0a0f')
        .attr('font-weight','600')
        .attr('opacity', 0)
        .transition().delay((d,i)=>i*120+200).duration(400).attr('opacity', 1);

    const sim = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d=>d.id).distance(90))
        .force('charge', d3.forceManyBody().strength(-250))
        .force('center', d3.forceCenter(W/2, H/2))
        .force('collision', d3.forceCollide(28))
        .on('tick',()=>{
            link
                .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
                .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
            linkLabel
                .attr('x',d=>(d.source.x+d.target.x)/2)
                .attr('y',d=>(d.source.y+d.target.y)/2-7);
            node.attr('transform',d=>`translate(${d.x},${d.y})`);
        });
}

let mergedRendered = false;

function renderMergedGraph() {
    const el = document.getElementById('fusion-merged');
    const W = el ? (el.clientWidth || 600) : 600;
    const H = 300;

    d3.select('#fusion-merged').selectAll('*').remove();

    const svg = d3.select('#fusion-merged').append('svg').attr('width', W).attr('height', H);

    svg.append('defs').append('marker')
        .attr('id','arr-fusion-merged')
        .attr('viewBox','0 -5 10 10')
        .attr('refX', 24).attr('refY', 0)
        .attr('markerWidth', 5).attr('markerHeight', 5)
        .attr('orient', 'auto')
        .append('path').attr('d','M0,-5L10,0L0,5').attr('fill', MERGE_COLOR+'66');

    const g = svg.append('g');

    const MERGED_NODES = [
        { id:'m1', name:'呼和浩特·呼市', type:'location', merged:true },
        { id:'m2', name:'内蒙古博物院·馆', type:'attraction', merged:true },
        { id:'m3', name:'烤全羊·额吉', type:'food', merged:true },
        { id:'m4', name:'2小时', type:'meta' },
        { id:'m5', name:'150元', type:'meta' },
        { id:'m6', name:'4.8分', type:'meta' },
        { id:'m7', name:'传统蒙餐', type:'meta' },
    ];

    const MERGED_LINKS = [
        { source:'m1', target:'m2', type:'景点' },
        { source:'m1', target:'m3', type:'美食' },
        { source:'m2', target:'m4', type:'游览' },
        { source:'m3', target:'m5', type:'消费' },
        { source:'m2', target:'m6', type:'评分' },
        { source:'m3', target:'m7', type:'特色' },
    ];

    const node = g.append('g').selectAll('g')
        .data(MERGED_NODES).enter().append('g');

    node.append('circle')
        .attr('r', 22)
        .attr('fill','none')
        .attr('stroke', d=>d.merged?MERGE_COLOR:'transparent')
        .attr('stroke-width', 1.5)
        .attr('opacity', 0)
        .transition().delay((d,i)=>i*100+600).duration(600)
        .attr('opacity', 0.25);

    node.append('rect')
        .attr('width', d=>Math.max(d.name.length*11+28,80))
        .attr('height', d=>d.merged?30:28)
        .attr('x', d=>-(Math.max(d.name.length*11+28,80))/2)
        .attr('y', d=>d.merged?-15:-14)
        .attr('rx', d=>d.merged?6:3)
        .attr('fill', d=>TYPE_COLORS_M[d.type]||'#5b9cf6')
        .attr('stroke', d=>d.merged?MERGE_COLOR+'66':MERGE_COLOR+'22')
        .attr('stroke-width', d=>d.merged?2:1)
        .attr('opacity', 0)
        .transition().delay((d,i)=>i*100).duration(500).attr('opacity', 1);

    node.append('text')
        .text(d=>d.name)
        .attr('text-anchor','middle')
        .attr('dominant-baseline','central')
        .attr('font-size', 10)
        .attr('fill','#0a0a0f')
        .attr('font-weight','600')
        .attr('opacity', 0)
        .transition().delay((d,i)=>i*100+200).duration(400).attr('opacity', 1);

    const link = g.append('g').selectAll('line')
        .data(MERGED_LINKS).enter().append('line')
        .attr('stroke', MERGE_COLOR+'44')
        .attr('stroke-width', 1.5)
        .attr('marker-end','url(#arr-fusion-merged)');

    const linkLabel = g.append('g').selectAll('text')
        .data(MERGED_LINKS).enter().append('text')
        .text(d=>d.type)
        .attr('font-size', 9)
        .attr('fill', MERGE_COLOR+'88')
        .attr('text-anchor','middle')
        .attr('font-family','JetBrains Mono, monospace');

    const sim = d3.forceSimulation(MERGED_NODES)
        .force('link', d3.forceLink(MERGED_LINKS).id(d=>d.id).distance(100))
        .force('charge', d3.forceManyBody().strength(-280))
        .force('center', d3.forceCenter(W/2, H/2))
        .force('collision', d3.forceCollide(30))
        .on('tick',()=>{
            link
                .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
                .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
            linkLabel
                .attr('x',d=>(d.source.x+d.target.x)/2)
                .attr('y',d=>(d.source.y+d.target.y)/2-7);
            node.attr('transform',d=>`translate(${d.x},${d.y})`);
        });

    mergedRendered = true;
}

function enableBtn(id, primary) {
    const btn = document.getElementById(id);
    btn.disabled = false;
    btn.style.opacity = '1';
    if (primary) {
        btn.classList.remove('cyber-btn');
        btn.classList.add('cyber-btn');
    }
}

function runStep1() {
    const dot = document.getElementById('fusionDot');
    const text = document.getElementById('fusionStatusText');
    const log = document.getElementById('fusionLog');
    dot.style.background = LEFT_COLOR;
    text.textContent = '正在对齐...';
    text.style.color = LEFT_COLOR;

    log.innerHTML = '';
    const items = [
        { color:LEFT_COLOR, num:1, text:'正在计算实体相似度 (Jaccard + 编辑距离)...' },
        { color:'#30d158', num:2, text:'「呼和浩特」≈「呼市」 相似度 95% ✓' },
        { color:'#30d158', num:3, text:'「内蒙古博物院」≈「内蒙古博物馆」 相似度 92% ✓' },
        { color:'#ffd60a', num:4, text:'「烤全羊」≈「额吉炭火烤全羊」 相似度 78% (需确认)' },
        { color:'#bf5af2', num:5, text:'找到 3 个候选对齐实体对，1 个待确认' },
    ];

    items.forEach((item,i)=>{
        setTimeout(()=>{
            const div = document.createElement('div');
            div.className = 'fusion-log-item';
            div.innerHTML = `
                <div class="fusion-log-icon" style="background:${item.color}22;color:${item.color};border:1px solid ${item.color}33">${item.num}</div>
                <div class="fusion-log-text">${item.text}</div>
            `;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }, i*500);
    });

    const btn = document.getElementById('step1Btn');
    btn.disabled = true;
    btn.style.opacity = '0.4';

    setTimeout(()=>{
        enableBtn('step2Btn', true);
    }, items.length*500+300);
}

function runStep2() {
    const dot = document.getElementById('fusionDot');
    const text = document.getElementById('fusionStatusText');
    dot.style.background = RIGHT_COLOR;
    text.textContent = '正在融合...';
    text.style.color = RIGHT_COLOR;

    const items = [
        { color:RIGHT_COLOR, num:6, text:'合并「呼和浩特」+「呼市」→ 实体节点 A1' },
        { color:RIGHT_COLOR, num:7, text:'合并「内蒙古博物院」+「内蒙古博物馆」→ A2' },
        { color:'#ffd60a', num:8, text:'「烤全羊」与「额吉炭火烤全羊」保留为同义词' },
        { color:'#30d158', num:9, text:'重建关系：合并后共 7 个实体、8 条关系' },
    ];

    items.forEach((item,i)=>{
        setTimeout(()=>{
            const log = document.getElementById('fusionLog');
            const div = document.createElement('div');
            div.className = 'fusion-log-item';
            div.innerHTML = `
                <div class="fusion-log-icon" style="background:${item.color}22;color:${item.color};border:1px solid ${item.color}33">${item.num}</div>
                <div class="fusion-log-text">${item.text}</div>
            `;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            if (i===items.length-1) {
                setTimeout(()=>renderMergedGraph(), 400);
            }
        }, i*600);
    });

    const btn = document.getElementById('step2Btn');
    btn.disabled = true;
    btn.style.opacity = '0.4';

    setTimeout(()=>{
        enableBtn('step3Btn', true);
    }, items.length*600+300);
}

function runStep3() {
    const dot = document.getElementById('fusionDot');
    const text = document.getElementById('fusionStatusText');
    dot.style.background = '#30d158';
    dot.style.boxShadow = '0 0 6px rgba(48,209,88,0.6)';
    text.textContent = '融合完成';
    text.style.color = '#30d158';

    const items = [
        { color:'#30d158', num:10, text:'执行跨图谱推理：基于融合后的图谱进行知识补全...' },
        { color:'#30d158', num:11, text:'推理发现：呼和浩特旅游热度与美食数量正相关 (r=0.82)' },
        { color:'#30d158', num:12, text:'推荐路径：呼和浩特 → 内蒙古博物院 → 烤全羊（评分 4.8）' },
        { color:'#30d158', num:13, text:'融合完成！统一知识图谱包含 7 个实体、8 条关系' },
    ];

    items.forEach((item,i)=>{
        setTimeout(()=>{
            const log = document.getElementById('fusionLog');
            const div = document.createElement('div');
            div.className = 'fusion-log-item';
            div.innerHTML = `
                <div class="fusion-log-icon" style="background:${item.color}22;color:${item.color};border:1px solid ${item.color}33">${item.num}</div>
                <div class="fusion-log-text">${item.text}</div>
            `;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }, i*500);
    });

    const btn = document.getElementById('step3Btn');
    btn.disabled = true;
    btn.style.opacity = '0.4';
}

function resetFusion() {
    ['step1Btn','step2Btn','step3Btn'].forEach(id=>{
        const btn = document.getElementById(id);
        btn.disabled = id!=='step1Btn';
        btn.style.opacity = id!=='step1Btn'?'0.4':'1';
    });
    const dot = document.getElementById('fusionDot');
    const text = document.getElementById('fusionStatusText');
    dot.style.background = '#3a3a4a';
    dot.style.boxShadow = 'none';
    text.textContent = '等待开始';
    text.style.color = '#3a3a4a';
    document.getElementById('fusionLog').innerHTML = `
        <div style="text-align:center;padding:60px 0;color:#3a3a4a;font-size:0.78rem;font-family:'JetBrains Mono',monospace;">
            <i class="fas fa-sitemap" style="font-size:1.2rem;margin-bottom:8px;display:block;opacity:0.3;"></i>
            融合日志将显示于此
        </div>`;
    makeGraph('fusion-left', JSON.parse(JSON.stringify(LEFT_NODES)), JSON.parse(JSON.stringify(LEFT_LINKS)), LEFT_COLOR, TYPE_COLORS_L);
    makeGraph('fusion-right', JSON.parse(JSON.stringify(RIGHT_NODES)), JSON.parse(JSON.stringify(RIGHT_LINKS)), RIGHT_COLOR, TYPE_COLORS_R);
    d3.select('#fusion-merged').selectAll('*').remove();
    mergedRendered = false;
}

window.addEventListener('load', ()=>{
    makeGraph('fusion-left', JSON.parse(JSON.stringify(LEFT_NODES)), JSON.parse(JSON.stringify(LEFT_LINKS)), LEFT_COLOR, TYPE_COLORS_L);
    makeGraph('fusion-right', JSON.parse(JSON.stringify(RIGHT_NODES)), JSON.parse(JSON.stringify(RIGHT_LINKS)), RIGHT_COLOR, TYPE_COLORS_R);
});

window.addEventListener('resize', ()=>{
    if (!mergedRendered) {
        makeGraph('fusion-left', JSON.parse(JSON.stringify(LEFT_NODES)), JSON.parse(JSON.stringify(LEFT_LINKS)), LEFT_COLOR, TYPE_COLORS_L);
        makeGraph('fusion-right', JSON.parse(JSON.stringify(RIGHT_NODES)), JSON.parse(JSON.stringify(RIGHT_LINKS)), RIGHT_COLOR, TYPE_COLORS_R);
    } else {
        makeGraph('fusion-left', JSON.parse(JSON.stringify(LEFT_NODES)), JSON.parse(JSON.stringify(LEFT_LINKS)), LEFT_COLOR, TYPE_COLORS_L);
        makeGraph('fusion-right', JSON.parse(JSON.stringify(RIGHT_NODES)), JSON.parse(JSON.stringify(RIGHT_LINKS)), RIGHT_COLOR, TYPE_COLORS_R);
        renderMergedGraph();
    }
});
</script>
