<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识图谱构建 · 奶业金融</title>
    <link rel="stylesheet" href="../../css/cyber.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* ── 页面布局 ── */
        body { background: #0a0a0f; }

        .demo-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(0,245,255,0.12);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .demo-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00f5ff;
            text-shadow: 0 0 12px rgba(0,245,255,0.6), 0 0 30px rgba(0,245,255,0.25);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .demo-title i { color: #00f5ff; }

        .demo-subtitle {
            font-size: 0.82rem;
            color: #7a7a8c;
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
        }

        .demo-badge {
            font-size: 0.6rem;
            padding: 3px 10px;
            border: 1px solid #ff2d78;
            color: #ff2d78;
            border-radius: 2px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(255,45,120,0.08);
            margin-top: 8px;
            display: inline-block;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
            align-items: start;
        }

        .left-col { display: flex; flex-direction: column; gap: 16px; }

        /* ── 图谱区域 ── */
        .graph-wrap {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0,245,255,0.12);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            min-height: 500px;
        }

        .graph-wrap::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00f5ff, transparent);
            opacity: 0.4;
        }

        #kg-graph { width: 100%; height: 500px; display: block; }

        .graph-legend {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(0,245,255,0.15);
            border-radius: 3px;
            padding: 8px 12px;
        }

        .legend-item {
            font-size: 0.7rem;
            color: #7a7a8c;
            margin-bottom: 4px;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-item:last-child { margin-bottom: 0; }

        .legend-dot {
            width: 8px; height: 8px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .graph-status-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 6px 14px;
            background: rgba(0,0,0,0.6);
            border-top: 1px solid rgba(0,245,255,0.08);
            font-size: 0.72rem;
            color: #3a3a4a;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.5px;
        }

        /* ── 输入卡片 ── */
        .input-label {
            font-size: 0.7rem;
            color: #7a7a8c;
            margin-bottom: 6px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
        }

        .cyber-input-area {
            width: 100%;
            height: 90px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0,245,255,0.12);
            border-radius: 3px;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            padding: 10px 12px;
            resize: none;
            outline: none;
            line-height: 1.7;
            caret-color: #00f5ff;
            transition: border-color 0.3s;
        }

        .cyber-input-area:focus {
            border-color: rgba(0,245,255,0.4);
            box-shadow: 0 0 0 1px rgba(0,245,255,0.1), inset 0 0 8px rgba(0,245,255,0.03);
        }

        .chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .chip {
            padding: 3px 10px;
            border: 1px solid rgba(0,245,255,0.15);
            border-radius: 2px;
            font-size: 0.65rem;
            cursor: pointer;
            color: #7a7a8c;
            background: rgba(0,0,0,0.3);
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
        }

        .chip:hover {
            border-color: #00f5ff;
            color: #00f5ff;
            background: rgba(0,245,255,0.06);
        }

        .chip.active {
            border-color: #00f5ff;
            color: #00f5ff;
            background: rgba(0,245,255,0.1);
            box-shadow: 0 0 6px rgba(0,245,255,0.2);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        /* ── 节点面板 ── */
        .node-panel {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 240px;
            background: rgba(13,17,23,0.95);
            border: 1px solid rgba(0,245,255,0.2);
            border-radius: 4px;
            z-index: 10;
            backdrop-filter: blur(12px);
            animation: fadeIn 0.2s ease;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .node-panel-hdr {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(0,245,255,0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .node-panel-hdr span {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace;
        }

        .node-type-tag {
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 2px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
        }

        .node-panel-body { padding: 12px 14px; }

        .node-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
        }

        .node-row:last-child { margin-bottom: 0; }

        .node-row .lbl { color: #3a3a4a; }

        .node-row .val { color: #e0e0e0; font-weight: 500; }

        .node-row .val.desc {
            font-size: 0.72rem;
            color: #7a7a8c;
            line-height: 1.5;
        }

        /* ── 右侧面板 ── */
        .right-col { display: flex; flex-direction: column; gap: 16px; }

        .section-title {
            font-size: 0.72rem;
            color: #00f5ff;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.8;
        }

        .extract-log {
            max-height: 220px;
            overflow-y: auto;
        }

        .extract-log::-webkit-scrollbar { width: 3px; }
        .extract-log::-webkit-scrollbar-thumb { background: rgba(0,245,255,0.3); border-radius: 2px; }

        .extract-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid rgba(0,245,255,0.06);
            font-size: 0.8rem;
            animation: fadeIn 0.3s ease;
        }

        .extract-item:last-child { border-bottom: none; }

        .extract-icon {
            width: 24px; height: 24px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .extract-text { flex: 1; line-height: 1.5; }

        .extract-text .ename { font-weight: 600; }

        .extract-text .etype { margin-left: 4px; }

        .extract-text .edesc { color: #3a3a4a; font-size: 0.72rem; margin-top: 2px; }

        /* ── 关系列表 ── */
        .rel-list { display: flex; flex-direction: column; gap: 8px; }

        .rel-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
            border-left: 2px solid #00f5ff;
            font-size: 0.8rem;
            animation: fadeIn 0.3s ease;
            font-family: 'JetBrains Mono', monospace;
        }

        .rel-from, .rel-to { font-weight: 600; color: #e0e0e0; font-size: 0.78rem; }

        .rel-arrow { color: #00f5ff; flex-shrink: 0; }

        .rel-type { color: #3a3a4a; flex: 1; text-align: center; font-size: 0.7rem; }

        /* ── 进度条 ── */
        .progress-wrap { margin-top: 12px; display: none; }

        .progress-label {
            font-size: 0.72rem;
            color: #3a3a4a;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(0,0,0,0.4);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #00f5ff, rgba(0,245,255,0.5));
            transition: width 0.4s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 1.5s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ── 响应式 ── */
        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
            #kg-graph { height: 380px; }
            .graph-wrap { min-height: 380px; }
        }
    </style>
</head>

let sim, currentSample = 0;

function initGraph() {
    const container = document.getElementById('kg-graph');
    const W = container.clientWidth, H = container.clientHeight;
    d3.select('#kg-graph').selectAll('*').remove();

    const svg = d3.select('#kg-graph').append('svg').attr('width', W).attr('height', H).attr('viewBox', [0,0,W,H]);

    // 缩放
    const zoom = d3.zoom().scaleExtent([0.3, 3]).on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoom);
    svg.on('dblclick.zoom', null);

    // 箭头
    svg.append('defs').append('marker')
        .attr('id', 'arrow')
        .attr('viewBox','0 -5 10 10')
        .attr('refX', 28).attr('refY', 0)
        .attr('markerWidth', 6).attr('markerHeight', 6)
        .attr('orient', 'auto')
        .append('path')
        .attr('d','M0,-5L10,0L0,5')
        .attr('fill','rgba(0,245,255,0.5)');

    const g = svg.append('g');
    sim = d3.forceSimulation()
        .force('link', d3.forceLink().id(d=>d.id).distance(130))
        .force('charge', d3.forceManyBody().strength(-420))
        .force('center', d3.forceCenter(W/2, H/2))
        .force('collision', d3.forceCollide(40));
    return g;
}

let gRef;

function renderGraph(data, animate) {
    gRef.selectAll('*').remove();

    const link = gRef.append('g').selectAll('line')
        .data(data.relations).enter().append('line')
        .attr('stroke','rgba(0,245,255,0.35)')
        .attr('stroke-width', 1.5)
        .attr('marker-end','url(#arrow)');

    const linkLabel = gRef.append('g').selectAll('text')
        .data(data.relations).enter().append('text')
        .text(d=>d.type)
        .attr('font-size', 10)
        .attr('fill','rgba(0,245,255,0.6)')
        .attr('text-anchor','middle')
        .attr('font-family','JetBrains Mono, monospace');

    const node = gRef.append('g').selectAll('g')
        .data(data.entities).enter().append('g')
        .attr('cursor','pointer')
        .call(d3.drag()
            .on('start', (e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
            .on('drag', (e,d)=>{ d.fx=e.x; d.fy=e.y; })
            .on('end', (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }))
        .on('click', (e,d)=>{ e.stopPropagation(); showNodePanel(d); });

    // 外发光
    node.append('circle')
        .attr('r', 24)
        .attr('fill','none')
        .attr('stroke', d=>ENTITY_COLORS[d.type].glow)
        .attr('stroke-width', 1)
        .attr('opacity', 0)
        .transition().delay((d,i)=>animate?i*120:0).duration(600)
        .attr('opacity', 0.2);

    node.append('rect')
        .attr('width', d=>Math.max(d.name.length*15+30,90))
        .attr('height', 32)
        .attr('x', d=>-(Math.max(d.name.length*15+30,90))/2)
        .attr('y', -16)
        .attr('rx', 4)
        .attr('fill', d=>ENTITY_COLORS[d.type].fill)
        .attr('stroke', d=>ENTITY_COLORS[d.type].stroke)
        .attr('stroke-width', 1.5)
        .attr('filter', 'url(#glow)')
        .attr('opacity', 0)
        .transition().delay((d,i)=>animate?i*120:0).duration(500)
        .attr('opacity', 1);

    const icons = {enterprise:'◆',product:'●',raw:'▲',finance:'★',channel:'■',location:'▼'};
    node.append('text')
        .text(d=>icons[d.type]||'●')
        .attr('font-size', 11)
        .attr('fill','rgba(0,0,0,0.7)')
        .attr('x', d=>-(Math.max(d.name.length*15+30,90))/2+8)
        .attr('y', 4)
        .attr('opacity', 0)
        .transition().delay((d,i)=>animate?i*120:0).duration(400)
        .attr('opacity', 1);

    node.append('text')
        .text(d=>d.name)
        .attr('text-anchor','start')
        .attr('dominant-baseline','central')
        .attr('font-size', 12)
        .attr('fill','#0a0a0f')
        .attr('font-weight','600')
        .attr('x', d=>-(Math.max(d.name.length*15+30,90))/2+22)
        .attr('opacity', 0)
        .transition().delay((d,i)=>animate?i*120+200:0).duration(400)
        .attr('opacity', 1);

    sim.nodes(data.entities).on('tick',()=>{
        link
            .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
            .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
        linkLabel
            .attr('x',d=>(d.source.x+d.target.x)/2)
            .attr('y',d=>(d.source.y+d.target.y)/2);
        node.attr('transform',d=>`translate(${d.x},${d.y})`);
    });

    sim.force('link').links(data.relations);
    sim.alpha(1).restart();

    document.getElementById('kgStatText').textContent = `NODE ${data.entities.length} / EDGE ${data.relations.length}`;
}

function showNodePanel(d) {
    const col = ENTITY_COLORS[d.type] || ENTITY_COLORS.enterprise;
    const label = ENTITY_TYPE_LABELS[d.type] || '实体';
    const existing = document.getElementById('kgNodePanel');
    if (existing) existing.remove();

    const panel = document.createElement('div');
    panel.id = 'kgNodePanel';
    panel.className = 'node-panel';
    panel.innerHTML = `
        <div class="node-panel-hdr">
            <span>${d.name}</span>
            <span class="node-type-tag" style="background:${col.fill}22;color:${col.fill};border:1px solid ${col.fill}44">${label}</span>
        </div>
        <div class="node-panel-body">
            <div class="node-row"><span class="lbl">名称</span><span class="val">${d.name}</span></div>
            <div class="node-row"><span class="lbl">类型</span><span class="val">${label}</span></div>
            <div class="node-row"><span class="lbl">描述</span><span class="val desc">${d.desc}</span></div>
        </div>
    `;
    document.querySelector('.graph-wrap').appendChild(panel);
    panel.addEventListener('click', e=>e.stopPropagation());
}

function setSample(idx, el) {
    currentSample = idx;
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('kgInput').value = SAMPLE_TEXTS[idx];
}

function buildGraph() {
    const data = KG_DATA[currentSample];
    const progress = document.getElementById('kgProgress');
    const bar = document.getElementById('kgProgressBar');
    const pct = document.getElementById('kgProgressPct');
    const text = document.getElementById('kgProgressText');

    progress.style.display = 'block';
    bar.style.width = '0%';
    pct.textContent = '0%';
    text.textContent = '分词中...';

    const STEPS = [
        { label:'分词中...', pct:15 },
        { label:'实体识别...', pct:40 },
        { label:'关系抽取...', pct:65 },
        { label:'构建图谱...', pct:85 },
        { label:'完成', pct:100 },
    ];

    let step = 0;
    const interval = setInterval(()=>{
        if (step < STEPS.length) {
            text.textContent = STEPS[step].label;
            bar.style.width = STEPS[step].pct + '%';
            pct.textContent = STEPS[step].pct + '%';
            step++;
        } else {
            clearInterval(interval);
            setTimeout(()=>{
                progress.style.display = 'none';
                document.getElementById('kgStatusBar').innerHTML =
                    '<span><i class="fas fa-circle" style="font-size:0.45rem;color:#30d158;margin-right:4px;"></i> 构建完成</span><span id="kgStatText"></span>';

                const log = document.getElementById('kgExtractLog');
                log.innerHTML = '';
                data.entities.forEach((e,i)=>{
                    const col = ENTITY_COLORS[e.type];
                    const label = ENTITY_TYPE_LABELS[e.type];
                    setTimeout(()=>{
                        const item = document.createElement('div');
                        item.className = 'extract-item';
                        item.innerHTML = `
                            <div class="extract-icon" style="background:${col.fill}22;color:${col.fill};border:1px solid ${col.fill}33">
                                <i class="fas fa-tag"></i>
                            </div>
                            <div class="extract-text">
                                <span class="ename" style="color:${col.fill}">${e.name}</span>
                                <span class="etype" style="color:#3a3a4a;">[${label}]</span>
                                <div class="edesc">${e.desc}</div>
                            </div>
                        `;
                        log.appendChild(item);
                    }, i*150);
                });

                const relList = document.getElementById('kgRelList');
                relList.innerHTML = '';
                data.relations.forEach((r,i)=>{
                    const src = data.entities.find(e=>e.id===r.source);
                    const tgt = data.entities.find(e=>e.id===r.target);
                    setTimeout(()=>{
                        const item = document.createElement('div');
                        item.className = 'rel-item';
                        item.style.borderLeftColor = ENTITY_COLORS[src.type].fill;
                        item.innerHTML = `
                            <span class="rel-from">${src?src.name:r.source}</span>
                            <span class="rel-arrow">→</span>
                            <span class="rel-type">${r.type} · ${r.desc}</span>
                            <span class="rel-arrow">→</span>
                            <span class="rel-to">${tgt?tgt.name:r.target}</span>
                        `;
                        relList.appendChild(item);
                    }, i*200);
                });

                const g = initGraph();
                gRef = g;
                renderGraph(data, true);
            }, 300);
        }
    }, 500);
}

function resetGraph() {
    const g = initGraph();
    gRef = g;
    document.getElementById('kgExtractLog').innerHTML = `
        <div style="text-align:center;padding:40px 0;color:#3a3a4a;font-size:0.8rem;font-family:'JetBrains Mono',monospace;">
            <i class="fas fa-terminal" style="font-size:1.4rem;margin-bottom:8px;display:block;opacity:0.3;"></i>
            点击"构建图谱"开始分析
        </div>`;
    document.getElementById('kgRelList').innerHTML = `
        <div style="text-align:center;padding:30px 0;color:#3a3a4a;font-size:0.8rem;font-family:'JetBrains Mono',monospace;">
            <i class="fas fa-project-diagram" style="font-size:1.2rem;margin-bottom:8px;display:block;opacity:0.3;"></i>
            关系抽取结果将显示于此
        </div>`;
    document.getElementById('kgStatusBar').innerHTML = `
        <span><i class="fas fa-circle" style="font-size:0.45rem;color:#30d158;margin-right:4px;"></i> 等待构建</span>
        <span>NODE 0 / EDGE 0</span>`;
    document.getElementById('kgProgress').style.display = 'none';
    const panel = document.getElementById('kgNodePanel');
    if (panel) panel.remove();
}

document.addEventListener('click', ()=>{
    const panel = document.getElementById('kgNodePanel');
    if (panel) panel.remove();
});

window.addEventListener('load', ()=>{
    const g = initGraph();
    gRef = g;
});
window.addEventListener('resize', ()=>{
    if (currentSample !== undefined) {
        const g = initGraph();
        gRef = g;
        renderGraph(KG_DATA[currentSample], false);
    }
});
</script>
</body>
</html>
